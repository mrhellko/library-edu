name: Refresh library_dev from library

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to refresh dev DB from prod"
        required: true
        default: "NO"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  refresh:
    runs-on: self-hosted
    environment: dev-db

    steps:
      - name: Safety check
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "YES" ]]; then
            echo "Confirmation not provided. Aborting."
            exit 1
          fi

      - name: Verify PostgreSQL tools exist
        run: |
          command -v psql >/dev/null 2>&1 || (echo "psql not found" && exit 1)
          command -v pg_dump >/dev/null 2>&1 || (echo "pg_dump not found" && exit 1)
          command -v pg_restore >/dev/null 2>&1 || (echo "pg_restore not found" && exit 1)
          command -v dropdb >/dev/null 2>&1 || (echo "dropdb not found" && exit 1)
          command -v createdb >/dev/null 2>&1 || (echo "createdb not found" && exit 1)

      - name: Dump prod (no owner, no privileges)
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: ${{ secrets.PGUSER_REFRESH }}
          PGPASSWORD: ${{ secrets.PGPASSWORD_REFRESH }}
          PROD_DB: library
        run: |
          set -euo pipefail
          rm -f /tmp/prod.dump
          pg_dump -Fc -d "$PROD_DB" --no-owner --no-privileges -f /tmp/prod.dump

      - name: Recreate dev DB and restore (public owned by app_dev_user)
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: ${{ secrets.PGUSER_REFRESH }}         # gha_refresh_user
          PGPASSWORD: ${{ secrets.PGPASSWORD_REFRESH }}
          DEV_DB: library_dev
          DEV_APP_USER: app_dev_user
        run: |
          set -euo pipefail

          psql -d postgres -v ON_ERROR_STOP=1 -c "
            SELECT pg_terminate_backend(pid)
            FROM pg_stat_activity
            WHERE datname = '$DEV_DB' AND pid <> pg_backend_pid();
          "

          dropdb --if-exists "$DEV_DB"
          createdb --owner="$PGUSER" "$DEV_DB"

          pg_restore -d "$DEV_DB" \
            --no-owner --no-privileges \
            --clean --if-exists \
            /tmp/prod.dump

          # передаём владение и права приложению
          psql -d "$DEV_DB" -v ON_ERROR_STOP=1 -c "
            -- public schema должен принадлежать app user
            GRANT USAGE, CREATE ON SCHEMA public TO \"$DEV_APP_USER\";

            -- передаём ownership всех объектов, которые принадлежат refresh user
            REASSIGN OWNED BY \"$PGUSER\" TO \"$DEV_APP_USER\";

            -- комфортный search_path
            ALTER ROLE \"$DEV_APP_USER\" IN DATABASE \"$DEV_DB\" SET search_path = public;
          "

      - name: Cleanup
        if: always()
        run: rm -f /tmp/prod.dump

      - name: Done
        run: echo "library_dev refreshed from library."